{% load static %}

<!doctype html>
<html lang="en">
    <head>
        <title>{% block titulo %} {% endblock %}</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body style="background-color:rgb(235, 235, 235);">
        <header>
            <!-- bs5-navbar-minimal-a -->
            <nav class="navbar navbar-expand navbar-dark bg-dark"> <!-- para cambiar el fondo y las letras es el   navbar-dark bg-dark -->
                <div class="nav navbar-nav">
                    <a class="nav-item nav-link active" href="{% url 'inicio' %}" aria-current="page">
                        Apolo - Asistencia <span class="visually-hidden">(current)</span>
                    </a>
                    <a class="nav-item nav-link" href="{% url 'ingresar' %}">Inicio</a>
                    <a class="nav-item nav-link" href="{% url 'nosotros' %}">Nosotros</a>
                    <a class="nav-item nav-link" href="{% url 'servicios' %}">Servicios</a>
                    <a class="nav-item nav-link" href="{% url 'estudiantes' %}">SistEstudiante</a>
                </div>
            </nav>
        </header>
        <main>
            <h1>Sistema de Información para asistencia</h1>
            <div class="container" style="background-color: aquamarine;">
                <div class="row">
                    <div class="col-12">
                        {% block contenido %} {% endblock %}
                    </div>
                </div>
            </div>
        </main>
        <footer>
            {% block pie %}
            <footer class="bg-dark text-white text-center py-3">
                <p>&copy; 2025 Apolo. Todos los derechos reservados.</p>
            </footer>
            {% endblock %}
        </footer>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
